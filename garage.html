<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Garage Camera</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#060a10;--panel:#0c1220;--border:#1a2d4a;--accent:#00e5ff;--green:#00ff88;--danger:#ff3860;--warn:#ffbb00;--text:#c8ddf0;--dim:#4a6278;--glow:0 0 18px rgba(0,229,255,.35);--glow2:0 0 18px rgba(0,255,136,.35)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Share Tech Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,229,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.04) 1px,transparent 1px);background-size:40px 40px}
    .wrapper{position:relative;z-index:1;width:100%;max-width:500px;display:flex;flex-direction:column;gap:16px}
    .logo{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;letter-spacing:.12em;color:var(--accent);text-shadow:var(--glow);text-align:center}
    .logo span{color:var(--green)}
    .status-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
    .badge{font-size:.7rem;padding:4px 12px;border-radius:12px;border:1px solid var(--border);color:var(--dim)}
    .badge.online{color:var(--green);border-color:var(--green)}
    .badge.offline{color:var(--danger);border-color:var(--danger)}
    .cam-box{position:relative;width:100%;aspect-ratio:4/3;background:#000;border-radius:12px;overflow:hidden;border:2px solid var(--border)}
    .cam-box.granted{border-color:var(--green);box-shadow:var(--glow2)}
    .cam-box.denied{border-color:var(--danger);box-shadow:0 0 18px rgba(255,56,96,.35)}
    #video{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1)}
    #overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
    #snap{display:none}
    .scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scan 2.5s linear infinite;opacity:0}
    .scanning .scan-line{opacity:1}
    @keyframes scan{0%{top:0}100%{top:100%}}
    .result-banner{position:absolute;bottom:0;left:0;right:0;padding:14px;text-align:center;font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;letter-spacing:.1em;opacity:0;transition:opacity .3s}
    .result-banner.show{opacity:1}
    .result-banner.granted{background:rgba(0,255,136,.25);color:var(--green)}
    .result-banner.denied{background:rgba(255,56,96,.2);color:var(--danger)}
    .result-banner.unknown{background:rgba(255,187,0,.15);color:var(--warn)}
    .scan-tag{position:absolute;top:10px;right:12px;font-size:.65rem;color:var(--accent);display:none}
    .scan-tag.active{display:block;animation:blink 1s step-end infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    .door-status{display:flex;align-items:center;justify-content:center;gap:12px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px}
    .door-icon{font-size:2rem}
    .door-label{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:700}
    .door-label.open{color:var(--green);text-shadow:var(--glow2)}
    .door-label.closed{color:var(--dim)}
    .visitor-box{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 18px}
    .vb-title{font-size:.65rem;color:var(--dim);letter-spacing:.15em;margin-bottom:6px}
    .vb-name{font-family:'Orbitron',sans-serif;font-size:1.4rem;font-weight:700;color:var(--accent)}
    .vb-name.known{color:var(--green)}
    .vb-time{font-size:.7rem;color:var(--dim);margin-top:4px}
    .btn-row{display:flex;gap:10px}
    .btn{font-family:'Orbitron',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.1em;padding:12px 0;border-radius:8px;border:1px solid;cursor:pointer;background:transparent;flex:1;transition:all .2s}
    .btn-start{color:var(--accent);border-color:var(--accent)}
    .btn-start:hover{box-shadow:var(--glow)}
    .btn:active{transform:scale(.97)}
    .url-row{display:flex;gap:8px}
    .url-input{font-family:'Share Tech Mono',monospace;font-size:.72rem;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);flex:1;outline:none}
    .url-input:focus{border-color:var(--accent)}
    .log-box{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 16px;max-height:120px;overflow-y:auto}
    .log-title{font-size:.65rem;color:var(--dim);letter-spacing:.15em;margin-bottom:8px}
    .log-list{list-style:none;font-size:.72rem;color:var(--dim)}
    .log-list li{padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)}
    .log-list li span{color:var(--accent)}
    .log-list li.ok span{color:var(--green)}
    .log-list li.err span{color:var(--danger)}
    .log-list li.warn span{color:var(--warn)}
  </style>
</head>
<body>
<div class="wrapper">
  <div class="logo">🚗 GARAGE <span>GATE</span></div>

  <div class="status-bar">
    <div class="url-row" style="flex:1">
      <input class="url-input" id="server-url" placeholder="https://your-app.railway.app" oninput="onUrlInput()"/>
    </div>
    <div class="badge offline" id="api-badge">● API</div>
    <div class="badge offline" id="fb-badge">● Firebase</div>
  </div>

  <div class="cam-box" id="cam-box">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
    <canvas id="snap"></canvas>
    <div class="scan-line"></div>
    <div class="result-banner" id="result-banner"></div>
    <div class="scan-tag" id="scan-tag">⬤ SCANNING</div>
  </div>

  <div class="door-status" id="door-status">
    <div class="door-icon">🔒</div>
    <div class="door-label closed" id="door-label">DOOR CLOSED</div>
  </div>

  <div class="visitor-box">
    <div class="vb-title">// CURRENT VISITOR</div>
    <div class="vb-name" id="visitor-name">NONE</div>
    <div class="vb-time" id="visitor-time"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-start" id="btn-cam" onclick="toggleCamera()">▶ START CAMERA</button>
  </div>

  <div class="log-box">
    <div class="log-title">// ACCESS LOG</div>
    <ul class="log-list" id="log-list"><li>System ready…</li></ul>
  </div>
</div>

<script>
// ── Firebase ──────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey:"AIzaSyDuQfUqqmBQuRaC-i6xuMaevdZNYhOABp4",
  databaseURL:"https://biocheckstation-default-rtdb.firebaseio.com/",
  projectId:"biocheckstation"
});
const fireDb = firebase.database();

fireDb.ref('.info/connected').on('value', snap => {
  const el = document.getElementById('fb-badge');
  if(snap.val()){ el.textContent='● Firebase'; el.className='badge online'; log('Firebase connected','ok'); }
  else { el.textContent='● Firebase'; el.className='badge offline'; }
});

// Listen to door status from Firebase (ESP32 also listens here)
fireDb.ref('/garage/door_status').on('value', snap => {
  const status = snap.val() || 'closed';
  updateDoorUI(status);
});

// Listen to current visitor
fireDb.ref('/garage/current_visitor').on('value', snap => {
  const name = snap.val();
  const isEmpty = !name || name === 'Unknown' || name.toLowerCase() === 'none';
  const el = document.getElementById('visitor-name');
  el.textContent = isEmpty ? 'NONE' : name.toUpperCase();
  el.className = isEmpty ? 'vb-name' : 'vb-name known';
  document.getElementById('visitor-time').textContent = !isEmpty ? 'Last seen: '+new Date().toLocaleTimeString() : '';
});

function updateDoorUI(status){
  const box = document.getElementById('cam-box');
  const icon = document.querySelector('.door-icon');
  const label = document.getElementById('door-label');
  if(status === 'open'){
    icon.textContent = '🔓';
    label.textContent = 'DOOR OPEN';
    label.className = 'door-label open';
    box.className = 'cam-box scanning granted';
    // Auto close after 5 seconds
    setTimeout(() => {
      fireDb.ref('/garage/door_status').set('closed');
      fetch(getUrl()+'/garage/close', {method:'POST'}).catch(()=>{});
    }, 5000);
  } else {
    icon.textContent = '🔒';
    label.textContent = 'DOOR CLOSED';
    label.className = 'door-label closed';
    if(stream) box.className = 'cam-box scanning';
    else box.className = 'cam-box';
  }
}

// ── Server URL ────────────────────────────────────────────────────────
const URL_KEY = 'garage_server_url';
function getUrl(){ return document.getElementById('server-url').value.replace(/\/$/,'').trim(); }

function onUrlInput(){
  const url = getUrl();
  if(url) localStorage.setItem(URL_KEY, url);
  clearTimeout(pingTimer);
  pingTimer = setTimeout(pingServer, 700);
}

let pingTimer = null;
async function pingServer(){
  const url = getUrl(); if(!url) return;
  try{
    const r = await fetch(url+'/', {signal: AbortSignal.timeout(5000)});
    const d = await r.json();
    document.getElementById('api-badge').textContent = '● API';
    document.getElementById('api-badge').className = 'badge online';
    log(`API online · ${d.registered_faces?.length ?? 0} face(s)`,'ok');
  } catch {
    document.getElementById('api-badge').textContent = '● API';
    document.getElementById('api-badge').className = 'badge offline';
    log('✗ Cannot reach server','err');
  }
}

// ── Camera & Scanning ─────────────────────────────────────────────────
let stream = null, scanTimer = null, scanning = false;
const SCAN_MS = 1500;   // scan every 1.5s
const CLOSE_DELAY = 5000; // door stays open 5s

async function toggleCamera(){
  if(stream){ stopCamera(); return; }
  try{
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}, audio:false});
    const v = document.getElementById('video');
    v.srcObject = stream; await v.play();
    document.getElementById('cam-box').classList.add('scanning');
    document.getElementById('btn-cam').textContent = '■ STOP CAMERA';
    log('Camera started','ok');
    scanTimer = setInterval(sendSnap, SCAN_MS);
  } catch(e){ log('✗ Camera: '+e.message,'err'); }
}

function stopCamera(){
  clearInterval(scanTimer); scanTimer = null;
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream = null; }
  document.getElementById('video').srcObject = null;
  document.getElementById('cam-box').className = 'cam-box';
  document.getElementById('btn-cam').textContent = '▶ START CAMERA';
  document.getElementById('scan-tag').classList.remove('active');
  clearOverlay();
  log('Camera stopped');
}

async function sendSnap(){
  const url = getUrl(); if(!url || scanning) return;
  const v = document.getElementById('video'); if(!v.videoWidth) return;
  scanning = true;
  document.getElementById('scan-tag').classList.add('active');
  try{
    const sc = document.getElementById('snap');
    sc.width = 320; sc.height = 240;
    sc.getContext('2d').drawImage(v, 0, 0, 320, 240);
    const b64 = sc.toDataURL('image/jpeg', 0.6).split(',')[1];
    const r = await fetch(url+'/garage/recognise', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({image: b64}),
      signal: AbortSignal.timeout(5000)
    });
    const d = await r.json();
    if(d.error){ log('✗ '+d.error,'err'); return; }

    const name = d.name;
    if(name && name !== 'Unknown'){
      showBanner(`✓ ${name.toUpperCase()} — ACCESS GRANTED`, 'granted');
      drawBox(v, true, name);
      log(`✓ ${name} — GRANTED (${Math.round(d.confidence*100)}%)`, 'ok');
    } else if(d.faces_found > 0){
      showBanner('✗ UNKNOWN — ACCESS DENIED', 'denied');
      drawBox(v, false, 'Unknown');
      log('✗ Unknown person — DENIED', 'err');
    } else {
      clearBanner();
      clearOverlay();
    }
  } catch(e){
    if(!e.message?.includes('abort')) log('✗ Scan: '+e.message,'err');
  } finally {
    scanning = false;
    document.getElementById('scan-tag').classList.remove('active');
  }
}

function drawBox(v, match, label){
  const c = document.getElementById('overlay');
  const ctx = c.getContext('2d');
  c.width = v.videoWidth; c.height = v.videoHeight;
  ctx.clearRect(0,0,c.width,c.height);
  const cx=c.width/2, cy=c.height/2, bw=c.width*.45, bh=c.height*.6;
  const x=cx-bw/2, y=cy-bh/2, cs=22;
  ctx.strokeStyle = match ? 'rgba(0,255,136,.85)' : 'rgba(255,56,96,.85)';
  ctx.lineWidth = 2;
  ctx.strokeRect(x,y,bw,bh);
  ctx.lineWidth = 3;
  [[x,y],[x+bw,y],[x,y+bh],[x+bw,y+bh]].forEach(([px,py])=>{
    const dx=px<cx?cs:-cs, dy=py<cy?cs:-cs;
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px+dx,py); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px,py+dy); ctx.stroke();
  });
  ctx.fillStyle = match ? 'rgba(0,255,136,.9)' : 'rgba(255,56,96,.9)';
  ctx.font = 'bold 14px "Share Tech Mono"';
  ctx.fillText(label, x+4, y>16 ? y-8 : y+18);
}

function clearOverlay(){
  const c = document.getElementById('overlay');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}

function showBanner(msg, type){
  const el = document.getElementById('result-banner');
  el.textContent = msg;
  el.className = 'result-banner show '+type;
}
function clearBanner(){
  document.getElementById('result-banner').className = 'result-banner';
}

function log(msg, type){
  const li = document.createElement('li');
  if(type) li.className = type;
  li.innerHTML = `<span>[${new Date().toLocaleTimeString()}]</span> ${msg}`;
  const ul = document.getElementById('log-list');
  ul.prepend(li);
  if(ul.children.length > 30) ul.lastChild.remove();
}

// ── Init ──────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const saved = localStorage.getItem(URL_KEY);
  if(saved){ document.getElementById('server-url').value = saved; pingServer(); }
});
</script>
</body>
</html>
