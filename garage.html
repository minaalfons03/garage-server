<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Garage Gate</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#060a10;--panel:#0c1220;--border:#1a2d4a;
      --accent:#00e5ff;--green:#00ff88;--danger:#ff3860;
      --warn:#ffbb00;--text:#c8ddf0;--dim:#4a6278;
      --glow:0 0 18px rgba(0,229,255,.35);
      --glow2:0 0 18px rgba(0,255,136,.35);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Share Tech Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;gap:12px}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,229,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.04) 1px,transparent 1px);background-size:40px 40px}
    .wrapper{position:relative;z-index:1;width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px}
    /* Header */
    .header{display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:900;letter-spacing:.12em;color:var(--accent);text-shadow:var(--glow)}
    .logo span{color:var(--green)}
    .badges{display:flex;gap:6px}
    .badge{font-size:.62rem;padding:3px 9px;border-radius:10px;border:1px solid var(--border);color:var(--dim)}
    .badge.on{color:var(--green);border-color:var(--green)}
    .badge.off{color:var(--danger);border-color:var(--danger)}
    /* URL input */
    .url-row{display:flex;gap:8px}
    .url-input{font-family:'Share Tech Mono',monospace;font-size:.72rem;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);flex:1;outline:none}
    .url-input:focus{border-color:var(--accent)}
    /* Camera */
    .cam-wrap{position:relative;width:100%;aspect-ratio:4/3;background:#000;border-radius:14px;overflow:hidden;border:2px solid var(--border);transition:border-color .3s,box-shadow .3s}
    .cam-wrap.granted{border-color:var(--green);box-shadow:var(--glow2)}
    .cam-wrap.denied{border-color:var(--danger);box-shadow:0 0 18px rgba(255,56,96,.4)}
    .cam-wrap.scanning{border-color:var(--accent)}
    #video{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1)}
    #overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
    #snap{display:none}
    .scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scanAnim 2.5s linear infinite;opacity:0;pointer-events:none}
    .cam-wrap.scanning .scan-line,.cam-wrap.granted .scan-line{opacity:1}
    @keyframes scanAnim{0%{top:0}100%{top:100%}}
    .result-banner{position:absolute;bottom:0;left:0;right:0;padding:14px;text-align:center;font-family:'Orbitron',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.08em;opacity:0;transition:opacity .3s;pointer-events:none}
    .result-banner.show{opacity:1}
    .result-banner.granted{background:rgba(0,255,136,.25);color:var(--green)}
    .result-banner.denied{background:rgba(255,56,96,.2);color:var(--danger)}
    .scan-tag{position:absolute;top:10px;right:12px;font-size:.62rem;color:var(--accent);display:none}
    .scan-tag.active{display:block;animation:blink 1s step-end infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    /* Door status */
    .door-card{display:flex;align-items:center;justify-content:center;gap:14px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;transition:border-color .3s}
    .door-card.open{border-color:var(--green)}
    .door-icon{font-size:2.2rem;line-height:1}
    .door-info{}
    .door-label{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;color:var(--dim)}
    .door-label.open{color:var(--green);text-shadow:var(--glow2)}
    .door-sub{font-size:.68rem;color:var(--dim);margin-top:3px}
    /* Visitor */
    .visitor-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 18px}
    .card-title{font-size:.62rem;letter-spacing:.15em;color:var(--dim);margin-bottom:6px;font-family:'Orbitron',sans-serif}
    .visitor-name{font-family:'Orbitron',sans-serif;font-size:1.5rem;font-weight:700;color:var(--accent)}
    .visitor-name.known{color:var(--green);text-shadow:var(--glow2)}
    .visitor-time{font-size:.68rem;color:var(--dim);margin-top:4px}
    /* Buttons */
    .btn-row{display:flex;gap:10px}
    .btn{font-family:'Orbitron',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.1em;padding:12px 0;border-radius:8px;border:1px solid;cursor:pointer;background:transparent;flex:1;transition:all .2s}
    .btn:active{transform:scale(.97)}
    .btn-cam{color:var(--accent);border-color:var(--accent)}
    .btn-cam:hover{box-shadow:var(--glow)}
    /* Log */
    .log-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 16px}
    .log-list{list-style:none;font-size:.7rem;color:var(--dim);max-height:100px;overflow-y:auto;margin-top:6px}
    .log-list li{padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)}
    .log-list li span{color:var(--accent)}
    .log-list li.ok span{color:var(--green)}
    .log-list li.err span{color:var(--danger)}
    .log-list li.warn span{color:var(--warn)}
  </style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <div class="header">
    <div class="logo">🚗 GARAGE <span>GATE</span></div>
    <div class="badges">
      <div class="badge off" id="api-badge">API</div>
      <div class="badge off" id="fb-badge">FB</div>
    </div>
  </div>

  <!-- Server URL -->
  <div class="url-row">
    <input class="url-input" id="server-url" placeholder="https://your-app.railway.app" oninput="onUrlInput()"/>
  </div>

  <!-- Camera -->
  <div class="cam-wrap" id="cam-wrap">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
    <canvas id="snap"></canvas>
    <div class="scan-line"></div>
    <div class="result-banner" id="result-banner"></div>
    <div class="scan-tag" id="scan-tag">⬤ SCANNING</div>
  </div>

  <!-- Door status -->
  <div class="door-card" id="door-card">
    <div class="door-icon" id="door-icon">🔒</div>
    <div class="door-info">
      <div class="door-label" id="door-label">DOOR CLOSED</div>
      <div class="door-sub" id="door-sub">Waiting for face…</div>
    </div>
  </div>

  <!-- Current visitor -->
  <div class="visitor-card">
    <div class="card-title">// CURRENT VISITOR</div>
    <div class="visitor-name" id="visitor-name">NONE</div>
    <div class="visitor-time" id="visitor-time"></div>
  </div>

  <!-- Button -->
  <div class="btn-row">
    <button class="btn btn-cam" id="btn-cam" onclick="toggleCamera()">▶ START CAMERA</button>
  </div>

  <!-- Log -->
  <div class="log-card">
    <div class="card-title">// ACCESS LOG</div>
    <ul class="log-list" id="log-list"><li>System ready…</li></ul>
  </div>

</div>
<script>
// ── Firebase ──────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyDdaewGhUk_r8yOG2EaRfaKs5FFdnRtn6w",
  databaseURL: "https://garage-6749f-default-rtdb.firebaseio.com",
  projectId: "garage-6749f",
  appId: "1:28927968533:web:214234beca5652e243d51c"
});
const fireDb = firebase.database();

fireDb.ref('.info/connected').on('value', snap => {
  const el = document.getElementById('fb-badge');
  el.textContent = 'FB';
  el.className = snap.val() ? 'badge on' : 'badge off';
  if(snap.val()) log('Firebase connected','ok');
});

fireDb.ref('/garage/door_status').on('value', snap => {
  updateDoor(snap.val() || 'closed');
});

fireDb.ref('/garage/current_visitor').on('value', snap => {
  const name = snap.val();
  const empty = !name || name === 'Unknown' || name.toLowerCase() === 'none';
  const el = document.getElementById('visitor-name');
  el.textContent = empty ? 'NONE' : name.toUpperCase();
  el.className = empty ? 'visitor-name' : 'visitor-name known';
  document.getElementById('visitor-time').textContent =
    !empty ? 'Last seen: ' + new Date().toLocaleTimeString() : '';
});

function updateDoor(status){
  const wrap  = document.getElementById('cam-wrap');
  const card  = document.getElementById('door-card');
  const icon  = document.getElementById('door-icon');
  const label = document.getElementById('door-label');
  const sub   = document.getElementById('door-sub');
  if(status === 'open'){
    icon.textContent  = '🔓';
    label.textContent = 'DOOR OPEN';
    label.className   = 'door-label open';
    sub.textContent   = 'Closing in 5 seconds…';
    card.className    = 'door-card open';
    wrap.classList.add('granted');
    wrap.classList.remove('denied');
  } else {
    icon.textContent  = '🔒';
    label.textContent = 'DOOR CLOSED';
    label.className   = 'door-label';
    sub.textContent   = 'Waiting for face…';
    card.className    = 'door-card';
    wrap.classList.remove('granted','denied');
    if(stream) wrap.classList.add('scanning');
  }
}

// ── Server URL ────────────────────────────────────────────────────────
const URL_KEY = 'garage_api_url';
function getUrl(){ return document.getElementById('server-url').value.replace(/\/$/,'').trim(); }

let pingTimer = null;
function onUrlInput(){
  const url = getUrl();
  if(url) localStorage.setItem(URL_KEY, url);
  clearTimeout(pingTimer);
  pingTimer = setTimeout(pingServer, 700);
}

async function pingServer(){
  const url = getUrl(); if(!url) return;
  try{
    const r = await fetch(url+'/', {signal: AbortSignal.timeout(5000)});
    const d = await r.json();
    const el = document.getElementById('api-badge');
    el.textContent = 'API'; el.className = 'badge on';
    log(`API online · ${d.registered_faces?.length ?? 0} face(s)`,'ok');
  } catch {
    const el = document.getElementById('api-badge');
    el.textContent = 'API'; el.className = 'badge off';
    log('✗ Cannot reach server','err');
  }
}

// ── Camera ────────────────────────────────────────────────────────────
let stream = null, scanTimer = null, scanning = false;
const SCAN_MS = 1500;

async function toggleCamera(){
  if(stream){ stopCamera(); return; }
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video: {facingMode: 'environment'}, audio: false
    });
    const v = document.getElementById('video');
    v.srcObject = stream; await v.play();
    document.getElementById('cam-wrap').classList.add('scanning');
    document.getElementById('btn-cam').textContent = '■ STOP CAMERA';
    log('Camera started','ok');
    scanTimer = setInterval(sendSnap, SCAN_MS);
  } catch(e){ log('✗ Camera: '+e.message,'err'); }
}

function stopCamera(){
  clearInterval(scanTimer); scanTimer = null;
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream = null; }
  document.getElementById('video').srcObject = null;
  document.getElementById('cam-wrap').className = 'cam-wrap';
  document.getElementById('btn-cam').textContent = '▶ START CAMERA';
  document.getElementById('scan-tag').classList.remove('active');
  clearOverlay(); clearBanner();
  log('Camera stopped');
}

async function sendSnap(){
  const url = getUrl(); if(!url || scanning) return;
  const v = document.getElementById('video'); if(!v.videoWidth) return;
  scanning = true;
  document.getElementById('scan-tag').classList.add('active');
  try{
    const sc = document.getElementById('snap');
    sc.width = 320; sc.height = 240;
    sc.getContext('2d').drawImage(v, 0, 0, 320, 240);
    const b64 = sc.toDataURL('image/jpeg', 0.6).split(',')[1];
    const r = await fetch(url+'/garage/recognise', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({image: b64}),
      signal: AbortSignal.timeout(5000)
    });
    const d = await r.json();
    if(d.error){ log('✗ '+d.error,'err'); return; }

    if(d.name && d.name !== 'Unknown'){
      showBanner('✓ '+d.name.toUpperCase()+' — ACCESS GRANTED','granted');
      drawBox(v, true, d.name);
      log('✓ '+d.name+' — GRANTED ('+Math.round(d.confidence*100)+'%)','ok');
    } else if(d.faces_found > 0){
      showBanner('✗ UNKNOWN — ACCESS DENIED','denied');
      drawBox(v, false, 'Unknown');
      document.getElementById('cam-wrap').classList.add('denied');
      log('✗ Unknown person — DENIED','err');
    } else {
      clearBanner(); clearOverlay();
      document.getElementById('cam-wrap').classList.remove('denied','granted');
      if(stream) document.getElementById('cam-wrap').classList.add('scanning');
    }
  } catch(e){
    if(!e.message?.includes('abort')) log('✗ '+e.message,'err');
  } finally {
    scanning = false;
    document.getElementById('scan-tag').classList.remove('active');
  }
}

function drawBox(v, match, label){
  const c = document.getElementById('overlay');
  const ctx = c.getContext('2d');
  c.width = v.videoWidth; c.height = v.videoHeight;
  ctx.clearRect(0,0,c.width,c.height);
  const cx=c.width/2, cy=c.height/2, bw=c.width*.45, bh=c.height*.6;
  const x=cx-bw/2, y=cy-bh/2, cs=22;
  ctx.strokeStyle = match ? 'rgba(0,255,136,.85)' : 'rgba(255,56,96,.85)';
  ctx.lineWidth = 2; ctx.strokeRect(x,y,bw,bh);
  ctx.lineWidth = 3;
  [[x,y],[x+bw,y],[x,y+bh],[x+bw,y+bh]].forEach(([px,py])=>{
    const dx=px<cx?cs:-cs, dy=py<cy?cs:-cs;
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px+dx,py); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px,py+dy); ctx.stroke();
  });
  ctx.fillStyle = match ? 'rgba(0,255,136,.9)' : 'rgba(255,56,96,.9)';
  ctx.font = 'bold 13px "Share Tech Mono"';
  ctx.fillText(label, x+4, y>16?y-8:y+18);
}
function clearOverlay(){
  const c=document.getElementById('overlay');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}
function showBanner(msg,type){
  const el=document.getElementById('result-banner');
  el.textContent=msg; el.className='result-banner show '+type;
}
function clearBanner(){ document.getElementById('result-banner').className='result-banner'; }
function log(msg,type){
  const li=document.createElement('li'); if(type) li.className=type;
  li.innerHTML=`<span>[${new Date().toLocaleTimeString()}]</span> ${msg}`;
  const ul=document.getElementById('log-list'); ul.prepend(li);
  if(ul.children.length>30) ul.lastChild.remove();
}

// ── Init ──────────────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  const saved = localStorage.getItem(URL_KEY);
  if(saved){ document.getElementById('server-url').value=saved; pingServer(); }
});
</script>
</body>
</html>
